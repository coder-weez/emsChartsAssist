<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style type="text/css">
      body {
        width: 280px;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        color: #222;
      }
      .header {
        background: #003f7f;
        color: #fff;
        padding: 10px 14px;
      }
      .header h1 {
        margin: 0;
        font-size: 15px;
      }
      .content {
        padding: 12px 14px;
      }
      .content p {
        margin: 0 0 10px;
        line-height: 1.4;
      }
      a {
        color: #2191c0;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .btn-link {
        display: inline-block;
        padding: 6px 12px;
        background: #2191c0;
        color: #fff;
        border-radius: 4px;
        font-weight: bold;
      }
      .btn-link:hover {
        background: #1b7aa3;
        text-decoration: none;
      }
      .muted {
        color: #777;
        font-size: 11px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>EMSCharts Assist</h1>
    </div>
    <div class="content">
      <p>Set default values that the AutoComplete buttons fill into your EMSCharts PCRs.</p>

      <p>
        First time here? Right-click this icon and choose <strong>Options</strong>,
        then fill in your defaults by category.
      </p>

      <p>
        <a class="btn-link"
           href="https://github.com/coder-weez/emsChartsAssist/issues"
           target="_blank" rel="noopener">Report an issue</a>
      </p>

      <p class="muted">
        Source:
        <a href="https://github.com/coder-weez/emsChartsAssist"
           target="_blank" rel="noopener">github.com/coder-weez/emsChartsAssist</a>
      </p>
    </div>
  </body>
</html>
